name: double_entry
description: Offline-first transaction input buffer for YNAB and Ledger-CLI.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0   # Bundles SQLite for Android/desktop
  path_provider: ^2.1.3          # For database file path (no GMS dependency)
  path: ^1.9.0

  # HTTP / YNAB API
  dio: ^5.4.3

  # Secure credential storage (uses hardware-backed Keystore, GMS-free)
  flutter_secure_storage: ^9.2.2

  # Routing
  go_router: ^14.2.0

  # Utilities
  uuid: ^4.4.0                   # For generating local IDs
  intl: ^0.19.0                  # Date formatting

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation for Drift and Riverpod
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3

  # Linting
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
